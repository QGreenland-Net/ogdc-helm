{{- $accessMode := lower .Values.auth.accessMode -}}
{{- if not (has $accessMode (list "authenticated" "read_only" "open")) -}}
  {{- fail "auth.accessMode must be one of: authenticated, read_only, open" -}}
{{- end -}}
{{- $oidcSecretName := .Values.auth.oidcSecretName | default (printf "%s-oidc-config" .Release.Name) -}}
{{- $oidcMountPath := .Values.auth.oidcMountPath | trimSuffix "/" -}}
{{- if and (eq $accessMode "authenticated") (or (not (hasPrefix "/" $oidcMountPath)) (eq $oidcMountPath "")) -}}
  {{- fail "auth.oidcMountPath must be an absolute, non-root path in authenticated mode" -}}
{{- end }}
# Template from: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#creating-a-deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-service-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: ogdc-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ogdc-service
  template:
    metadata:
      labels:
        app: ogdc-service
    spec:
      containers:
      - name: ogdc-service
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
          - "bash"
          - "-c"
          - "{{ .Values.ogdc_service_command }}"
        ports:
        - containerPort: 8000
          name: ogdc-api-port
        envFrom:
        - secretRef:
            name: "{{ .Release.Name }}-api-secrets"
        - configMapRef:
            name: "{{ .Release.Name }}-ogdc-service-config"
        env:
        # OGDC envvars from secrets
        - name: OGDC_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: "{{ .Release.Name }}-db-postgres-secrets"
              key: username
        - name: OGDC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "{{ .Release.Name }}-db-postgres-secrets"
              key: password
        - name: S3_SECRET_KEY_ID
          valueFrom:
            secretKeyRef:
              name: "{{ .Release.Name }}-secrets"
              key: rootUser
        - name: S3_SECRET_KEY_KEY
          valueFrom:
            secretKeyRef:
              name: "{{ .Release.Name }}-secrets"
              key: rootPassword
        {{- if eq $accessMode "authenticated" }}
        - name: OIDC_CLIENT_SECRETS_FILE
          value: "{{ $oidcMountPath }}/client_secrets.json"
        {{- end }}
        {{- if eq $accessMode "authenticated" }}
        volumeMounts:
        - name: oidc-client-secrets
          mountPath: {{ $oidcMountPath | quote }}
          readOnly: true
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- if eq $accessMode "authenticated" }}
      volumes:
      - name: oidc-client-secrets
        secret:
          secretName: {{ $oidcSecretName | quote }}
          defaultMode: 0440
          items:
          - key: {{ required "auth.oidcSecretKey is required in authenticated mode" .Values.auth.oidcSecretKey | quote }}
            path: client_secrets.json
      {{- end }}
