## override values.yaml with values to use for running on a local Rancher Desktop cluster
##
## example:
##
##  export RELEASE_NAME=qgnet-ogdc NAMESPACE=qgnet
##  envsubst < ./helm/examples/values-local-cluster-ogdc-example.yaml | \
##  helm upgrade --install "$RELEASE_NAME" --debug -n "$NAMESPACE" \
##      -f - oci://ghcr.io/qgreenland-net/charts/ogdc
##
## see values.yaml for full documentation on the following parameters
##


global:
  ## @param global.passwordsSecret The name of the Secret containing application passwords
  ## This is the secret deployed using your own private, edited version of `../admin/secrets.yaml`.
  ##
  ## (Note the actual key passwordsSecret is not used anywhere; only the yaml anchor/alias
  ##  &passwordSecretName. IF YOU OVERRIDE THIS VALUE IN ANOTHER VALUES-OVERLAY FILE, YOU ALSO
  ## NEED TO OVERRIDE THE VALUES THAT USE THIS ANCHOR - search this file for 'passwordSecretName')
  passwordsSecret: &passwordSecretName ${RELEASE_NAME}-secrets

  ## @param global.defaultStorageClass Global default StorageClass for Persistent Volume(s)
  ##
  ## Inspect your cluster to see what storageClass is set as default:
  ##    $  kubectl get storageclass
  ## ...and then explicitly set defaultStorageClass to match the name of the default storageclass
  ## (e.g. for Rancher Desktop, use:   defaultStorageClass: local-path)
  ##
  defaultStorageClass: &defaultStorageClass local-path

## argo-workflows configuration
## See https://argoproj.github.io/argo-workflows/
argo-workflows:
  ## -- Restrict Argo to operate only in a single namespace (the namespace of the
  ## Helm release) by apply Roles and RoleBindings instead of the Cluster
  ## equivalents, and start workflow-controller with the --namespaced flag. Use it
  ## in clusters with strict access policy.
  singleNamespace: false

  ## Custom resource configuration
  crds:
    ## -- Install and upgrade CRDs
    install: true

  controller:
    workflowNamespaces:
      - ${NAMESPACE}

    persistence:
      postgresql:
        host: "${RELEASE_NAME}-db-cnpg-rw"
        userNameSecret:
          name: "${RELEASE_NAME}-db-postgres-secrets"
        passwordSecret:
          name: "${RELEASE_NAME}-db-postgres-secrets"

  server:
    ## Ingress configuration.
    # ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
    ingress:
      # -- Enable an ingress resource
      enabled: false

  ## Artifact repository configuration
  artifactRepository:
    s3:
      ## Note the `key` attribute is not the actual secret, it's the PATH to
      ## the contents in the associated secret, as defined by the `name` attribute.
      accessKeySecret:
        name: *passwordSecretName
        key: rootUser
      secretKeySecret:
        name: *passwordSecretName
        key: rootPassword

## MinIO configuration
minio:
  ## Enable persistence using Persistent Volume Claims
  ## ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
  ##
  persistence:
    enabled: true

    ## minio data Persistent Volume Storage Class
    ## If defined, storageClassName: <storageClass>
    ## If set to "-", storageClassName: "", which disables dynamic provisioning
    ## If undefined (the default) or set to null, no storageClassName spec is
    ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
    ##   GKE, AWS & OpenStack)
    ##
    ## Storage class of PV to bind. By default it looks for standard storage class.
    ## If the PV uses a different storage class, specify that here.
    storageClass: *defaultStorageClass
    ## Persistent Volume Access Mode
    accessMode: ReadWriteOnce
    ## Persistent Volume Size
    size: 5Gi


  existingSecret: *passwordSecretName

# Ensures that local image of ogdc-service is used.
image:
  repository: "ogdc-runner"
  tag: latest
  pullPolicy: Never

environment: "local"

ingress:
  enabled: true
  tls:
    - hosts:
      - localhost
      secretName: ${RELEASE_NAME}-local-tls-cert

viz_workflow:
  resources:
    stage:
      ## @param viz_workflow.resources.stage.requests.cpu CPU requests for staging and web tile worker pods.
      ## @param viz_workflow.resources.stage.requests.memory Memory requests for staging and web tile worker pods.
      requests:
        cpu: "500m"
        memory: "1Gi"
      ## @param viz_workflow.resources.stage.limits.cpu CPU limits for staging and web tile worker pods.
      ## @param viz_workflow.resources.stage.limits.memory Memory limits for staging and web tile worker pods.
      limits:
        cpu: "2"
        memory: "6Gi"
    raster:
      ## @param viz_workflow.resources.raster.requests.cpu CPU requests for raster and composite worker pods.
      ## @param viz_workflow.resources.raster.requests.memory Memory requests for raster and composite worker pods.
      requests:
        cpu: "1"
        memory: "2Gi"
      ## @param viz_workflow.resources.raster.limits.cpu CPU limits for raster and composite worker pods.
      ## @param viz_workflow.resources.raster.limits.memory Memory limits for raster and composite worker pods.
      limits:
        cpu: "4"
        memory: "12Gi"
    threedtile:
      ## @param viz_workflow.resources.threedtile.requests.cpu CPU requests for 3D tile worker pods.
      ## @param viz_workflow.resources.threedtile.requests.memory Memory requests for 3D tile worker pods.
      requests:
        cpu: "2"
        memory: "2Gi"
      ## @param viz_workflow.resources.threedtile.limits.cpu CPU limits for 3D tile worker pods.
      ## @param viz_workflow.resources.threedtile.limits.memory Memory limits for 3D tile worker pods.
      limits:
        cpu: "4"
        memory: "8Gi"
    discovery:
      ## @param viz_workflow.resources.discovery.requests.cpu CPU requests for discovery worker pods.
      ## @param viz_workflow.resources.discovery.requests.memory Memory requests for discovery worker pods.
      requests:
        cpu: "250m"
        memory: "512Mi"
      ## @param viz_workflow.resources.discovery.limits.cpu CPU limits for discovery worker pods.
      ## @param viz_workflow.resources.discovery.limits.memory Memory limits for discovery worker pods.
      limits:
        cpu: "500m"
        memory: "1Gi"

# Use fastapi dev server for local dev
ogdc_service_command: ". ./.venv/bin/activate && fastapi dev --port 8000 --host 0.0.0.0 src/ogdc_runner/service/main.py"

ogdc_public_host: "localhost"
ogdc_s3_endpoint: "http://${RELEASE_NAME}-minio:9000"
ogdc_public_s3_url: "https://localhost:7443/storage"
ogdc_workflow_pvc_name: "cephfs-${RELEASE_NAME}-workflow-pvc"
ogdc_viz_workflow_image: "ghcr.io/permafrostdiscoverygateway/viz-workflow:1.1.0-dev-2"
access_mode: "open"
ogdc_input_pvcs:
  - claimName: "ogdc-test-pvc"
    description: "Local test input data PVC"

auth:
  accessMode: "open"
