# https://skaffold.dev/docs/references/yaml/
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: ogdc
build:
  local:
    push: false

  # Configures skaffold to push the image with the sha256 as the tag, in
  # addition to `latest`.
  # See: https://skaffold.dev/docs/taggers/#sha256-uses-latest-to-tag-images
  tagPolicy:
    sha256: {}

  artifacts:
    - image: ogdc-runner
      # https://skaffold.dev/docs/builders/builder-types/docker/
      context: ../ogdc-runner/
      sync:
        # See: https://skaffold.dev/docs/filesync/#manual-sync-mode
        manual:
          - src: "src/**/*"
            dest: "/ogdc_runner/"
      docker:
        dockerfile: Dockerfile
        cacheFrom:
          # Local Docker builder replaces cache references to the artifact image with
          # the tagged image reference, useful for caching from the previous build.
          - ogdc-runner

deploy:
  helm:
    releases:
      - name: qgnet-ogdc
        namespace: qgnet
        chartPath: ./helm
        setValueTemplates:
          image.tag: "{{.IMAGE_TAG_ogdc_runner}}"
        valuesFiles:
          - ./helm/examples/values-local-cluster-ogdc-example.yaml
        # Resolve ${RELEASE_NAME}/${NAMESPACE} placeholders
        overrides:
          global:
            passwordsSecret: "qgnet-ogdc-secrets"
          argo-workflows:
            controller:
              workflowNamespaces:
                - qgnet
              persistence:
                postgresql:
                  host: "qgnet-ogdc-db-cnpg-rw"
                  userNameSecret:
                    name: "qgnet-ogdc-db-postgres-secrets"
                  passwordSecret:
                    name: "qgnet-ogdc-db-postgres-secrets"
            artifactRepository:
              s3:
                accessKeySecret:
                  name: "qgnet-ogdc-secrets"
                secretKeySecret:
                  name: "qgnet-ogdc-secrets"
          minio:
            existingSecret: "qgnet-ogdc-secrets"
          ogdc_s3_endpoint: "http://qgnet-ogdc-minio:9000"


portForward:
  # Expose ogdc-runner API at port 8000
  - resourceType: service
    resourceName: qgnet-ogdc-service
    namespace: qgnet
    port: 8000
    localPort: 8000
  # Expose argo dashboard at port 2746
  - resourceType: service
    resourceName: qgnet-ogdc-argo-workflows-server
    namespace: qgnet
    port: 2746
    localPort: 2746
  # Expose postgresql at port 5432
  - resourceType: service
    resourceName: qgnet-ogdc-db-cnpg-rw
    namespace: qgnet
    port: 5432
    localPort: 5432
  # Expose adminer at port 9090 (8080 is for docs)
  # Use: http://localhost:9090/?pgsql=qgnet-ogdc-db-cnpg-rw&username=admin&db=ogdc
  # Connect to the postgres database with params:
  #   * System: Postgresql
  #   * Server: postgresql-service
  #   * Username: admin
  #   * Password: password
  #   * Database: ogdc
  - resourceType: service
    resourceName: qgnet-ogdc-adminer-service
    namespace: qgnet
    port: 8080
    localPort: 9090
  - resourceType: service
    resourceName: qgnet-ogdc-minio
    namespace: qgnet
    port: 9000
    localPort: 9000
  # nginx ingress controller
  - resourceType: service
    resourceName: ingress-nginx-controller
    namespace: ingress-nginx
    port: 80
    localPort: 7777
  - resourceType: service
    resourceName: ingress-nginx-controller
    namespace: ingress-nginx
    port: 443
    localPort: 7443
